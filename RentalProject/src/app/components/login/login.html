<div class="register-container">
    <div class="register-header">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h2>התחברות</h2>
        <p>ברוך הבא חזרה ל-RENTCAR</p>
    </div>

    <form class="register-form" [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="form-group">
            <label>אימייל <span class="required">*</span></label>
            <div class="input-wrapper">
                <input type="email" formControlName="email" placeholder="example@gmail.com">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                    <path d="m2 7 10 7 10-7"></path>
                </svg>
            </div>
            
            <small class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                נא להזין אימייל תקין
            </small>
        </div>

        <button type="submit" class="btn-submit" [disabled]="loginForm.invalid">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            התחבר למערכת
        </button>

        <p class="footer-link">
            עדיין לא רשום? <a routerLink="/register">צור חשבון חדש</a>
        </p>
    </form>

    <div class="security-badge">
        🔒 החיבור שלך מאובטח ומוצפן
    </div>
</div>
